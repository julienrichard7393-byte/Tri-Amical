<style>
  :root{
    --ink:#0B1D33;
    --ink-2:#122844;
    --ink-3:#1C3A5E;
    --paper:#EFF3F1;
    --paper-2:#E2E9E5;
    --text-on-ink:#F3F1EA;
    --text-on-paper:#0B1D33;
    --muted:#5C7086;
    --swim:#1FA6A0;
    --bike:#FF5A1F;
    --run:#FFB100;
    --danger:#E14B4B;
    --ok:#2FB673;
    --radius:14px;
    --font-display:'Big Shoulders Display', 'Arial Black', sans-serif;
    --font-mono:'Space Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --font-body:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--text-on-paper);
    font-family:var(--font-body);
    min-height:100vh;
  }
  ::selection{background:var(--bike);color:#fff;}

  /* ---------- Top bar ---------- */
  .topbar{
    background:var(--ink);
    color:var(--text-on-ink);
    padding:18px 20px 0 20px;
    position:sticky;top:0;z-index:50;
    box-shadow:0 2px 12px rgba(11,29,51,.25);
  }
  .topbar-inner{max-width:980px;margin:0 auto;}
  .brand{
    display:flex;align-items:baseline;gap:10px;margin-bottom:14px;
  }
  .brand-mark{
    font-family:var(--font-display);
    font-weight:800;
    font-size:26px;
    letter-spacing:.5px;
    display:flex;gap:2px;
  }
  .brand-mark span:nth-child(1){color:var(--swim);}
  .brand-mark span:nth-child(2){color:var(--bike);}
  .brand-mark span:nth-child(3){color:var(--run);}
  .brand-sub{font-size:12px;color:#9FB4CC;letter-spacing:.06em;text-transform:uppercase;}
  .tabs{display:flex;gap:4px;}
  .tab-btn{
    background:transparent;border:none;color:#9FB4CC;
    font-family:var(--font-body);font-weight:600;font-size:14px;
    padding:10px 16px;cursor:pointer;border-radius:10px 10px 0 0;
    transition:background .15s, color .15s;
  }
  .tab-btn:hover{color:#fff;}
  .tab-btn.active{background:var(--paper);color:var(--ink);}

  .view{max-width:980px;margin:0 auto;padding:20px 16px 60px;}
  .view[hidden]{display:none;}

  h1,h2,h3{font-family:var(--font-display);font-weight:800;letter-spacing:.3px;margin:0 0 4px;}
  h2{font-size:26px;}
  h3{font-size:18px;}
  p.lead{color:var(--muted);margin:0 0 18px;font-size:14px;}

  .card{
    background:#fff;border-radius:var(--radius);
    padding:18px;margin-bottom:16px;
    box-shadow:0 1px 3px rgba(11,29,51,.08);
    border:1px solid var(--paper-2);
  }
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .row.between{justify-content:space-between;}

  button{
    font-family:var(--font-body);font-weight:600;cursor:pointer;
    border:none;border-radius:10px;padding:10px 16px;font-size:14px;
    transition:transform .08s, filter .15s;
  }
  button:active{transform:scale(.97);}
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-primary:hover{filter:brightness(1.2);}
  .btn-accent{background:var(--bike);color:#fff;}
  .btn-accent:hover{filter:brightness(1.08);}
  .btn-ghost{background:var(--paper-2);color:var(--text-on-paper);}
  .btn-ghost:hover{background:#d7e0dc;}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px;}
  button:disabled{opacity:.4;cursor:not-allowed;}

  input,select{
    font-family:var(--font-body);font-size:14px;
    padding:9px 12px;border-radius:9px;border:1.5px solid var(--paper-2);
    background:#fff;color:var(--text-on-paper);
  }
  input:focus,select:focus{outline:2px solid var(--bike);outline-offset:1px;}
  input[type=text].mono, input.time-input{font-family:var(--font-mono);}

  .badge{
    display:inline-flex;align-items:center;gap:5px;
    font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;
    text-transform:uppercase;letter-spacing:.04em;
  }
  .badge-sprint{background:#DDEDEC;color:var(--swim);}
  .badge-olympique{background:#FFE7DA;color:var(--bike);}
  .badge-dnf{background:#FBE0E0;color:var(--danger);}
  .badge-ok{background:#DBF3E7;color:var(--ok);}
  .badge-wait{background:var(--paper-2);color:var(--muted);}

  .segbar{display:flex;height:8px;border-radius:6px;overflow:hidden;background:var(--paper-2);}
  .segbar > div{height:100%;}

  table{width:100%;border-collapse:collapse;font-size:14px;}
  th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;
    color:var(--muted);padding:8px 10px;border-bottom:2px solid var(--paper-2);
  }
  td{padding:10px;border-bottom:1px solid var(--paper-2);vertical-align:middle;}
  tr.clickable{cursor:pointer;}
  tr.clickable:hover{background:var(--paper);}
  .mono{font-family:var(--font-mono);}
  .rank-num{font-family:var(--font-display);font-weight:800;font-size:18px;}Aucune réponse
